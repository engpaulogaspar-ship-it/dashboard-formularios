<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Relatório de Vistoria Técnica - Subestação</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #003366;
      --secondary-color: #0056b3;
      --accent-color: #28a745;
      --light-bg: #f8fafc;
      --card-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
      --border-radius: 12px;
    }

    body {
      font-family: 'Arial', 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      min-height: 100vh;
      padding: 20px 10px;
      color: #333;
    }

    .dashboard-container { max-width: 1400px; margin: 0 auto; }
    .dashboard-header {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 20px 30px;
      border-radius: var(--border-radius);
      margin-bottom: 30px;
      box-shadow: var(--card-shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 140px;
      position: relative;
    }
    .logo-img { height: 90px; width: auto; background: white; padding: 10px; border-radius: 10px; object-fit: contain; }
    .org-info { text-align: center; flex: 1; padding: 0 30px; }
    .org-title { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
    .report-title { font-size: 16px; background: rgba(255,255,255,0.15); padding: 8px 20px; border-radius: 8px; display: inline-block; }
    .dashboard-card {
      background: white;
      border-radius: var(--border-radius);
      padding: 25px;
      box-shadow: var(--card-shadow);
      margin-bottom: 25px;
      transition: transform 0.3s ease;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }
    .card-title { font-size: 18px; font-weight: 700; color: var(--primary-color); margin: 0; display: flex; gap: 10px; align-items: center; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 25px; }
    .form-group { margin-bottom: 20px; }
    .form-label { font-weight: 600; color: #495057; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .form-control, .field-input, .large-textarea {
      border: 2px solid #e9ecef;
      border-radius: 8px;
      padding: 12px 15px;
      width: 100%;
      transition: all 0.3s;
      font-size: 15px;
    }
    .form-control:focus, .field-input:focus, .large-textarea:focus {
      border-color: var(--primary-color);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,51,102,0.1);
    }
    .texto-preview {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      border: 2px solid #e9ecef;
      margin: 20px 0;
      font-size: 15px;
      line-height: 1.6;
      text-align: justify;
      white-space: pre-line;
      max-height: 300px;
      overflow-y: auto;
    }
    .checkbox-group { display: flex; flex-direction: column; gap: 20px; margin: 20px 0; }
    .checkbox-container { background: #f8f9fa; padding: 20px; border-radius: 10px; border: 2px solid #e9ecef; transition: all 0.3s; }
    .checkbox-container.checked { border-color: var(--primary-color); background: rgba(0,51,102,0.05); }
    .checkbox-option { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; margin-bottom: 15px; }
    .checkbox-option input[type="checkbox"] { width: 22px; height: 22px; margin-top: 3px; accent-color: var(--primary-color); }
    .checkbox-description { margin-top: 15px; padding-left: 32px; }
    .checkbox-description textarea { width: 100%; min-height: 100px; border-radius: 8px; padding: 12px; border: 2px solid #e9ecef; }
    .foto-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
    @media (max-width: 1200px) { .foto-gallery { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px) { .foto-gallery { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .foto-gallery { grid-template-columns: 1fr; } }
    .foto-item { background: #f8f9fa; border-radius: 8px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.1); position: relative; }
    .foto-preview { width: 100%; height: 150px; background: #e9ecef; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .foto-preview img { width: 100%; height: 100%; object-fit: cover; }
    .foto-number { position: absolute; top: 8px; left: 8px; background: var(--primary-color); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 2; }
    .foto-actions { position: absolute; top: 8px; right: 8px; z-index: 3; opacity: 0; transition: 0.2s; }
    .foto-item:hover .foto-actions { opacity: 1; }
    .foto-action-btn { background: rgba(0,0,0,0.7); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
    .foto-description { padding: 12px; background: white; border-top: 1px solid #e9ecef; }
    .foto-description input { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 8px; font-size: 13px; }
    .add-foto-btn { background: #f8f9fa; border: 2px dashed #6c757d; border-radius: 8px; width: 100%; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    .btn-add-field {
      background: linear-gradient(135deg, #6610f2, #6f42c1);
      color: white; padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600;
      display: inline-flex; align-items: center; gap: 8px; cursor: pointer; margin-top: 10px;
    }
    .btn-remove-field { background: #dc3545; color: white; border: none; border-radius: 6px; padding: 6px 14px; margin-left: 10px; cursor: pointer; }
    .field-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .field-number { background: var(--primary-color); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
    .field-input { flex: 1; }
    .btn-group-custom { display: flex; gap: 15px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
    .btn-custom { padding: 12px 24px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .btn-save { background: #28a745; color: white; }
    .btn-load { background: #17a2b8; color: white; }
    .btn-pdf { background: #dc3545; color: white; }
    .btn-clear { background: #6c757d; color: white; }
    .status-bar { position: fixed; bottom: 25px; right: 25px; background: #28a745; color: white; padding: 12px 20px; border-radius: 10px; display: none; z-index: 1000; font-weight: 500; }
    .assinatura-container { background: white; padding: 30px; border-radius: 12px; border: 2px solid #e9ecef; margin-top: 20px; }
    .assinatura-line { height: 2px; background: #333; margin-top: 50px; position: relative; }
    .assinatura-text { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: white; padding: 0 20px; }
    @media print { .no-print { display: none; } body { background: white; } }
  </style>
</head>
<body>
<div class="dashboard-container">
  <div class="dashboard-header">
    <div class="logo-left"><img src="https://upload.wikimedia.org/wikipedia/pt/b/ba/Logo_IAT_PR.png" class="logo-img" alt="Logo"></div>
    <div class="org-info"><h1 class="org-title">DIVISÃO DE LICENCIAMENTO ESTRATÉGICO</h1><div class="report-title">RELATÓRIO DE VISTORIA TÉCNICA</div></div>
    <div class="logo-right"><img src="https://image2url.com/r2/default/images/1770223607016-99c57976-38bc-462d-aaac-01c87703b919.png" class="logo-img" alt="IAT"></div>
  </div>

  <!-- IDENTIFICAÇÃO -->
  <div class="dashboard-card">
    <div class="card-header"><h3 class="card-title"><i class="fas fa-fingerprint"></i> IDENTIFICAÇÃO DO EMPREENDIMENTO</h3></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">INTERESSADO:</label><input type="text" id="interessado" class="form-control" placeholder="Nome do interessado"></div>
      <div class="form-group"><label class="form-label">ASSUNTO:</label><input type="text" id="assunto" class="form-control" placeholder="Assunto da vistoria"></div>
      <div class="form-group"><label class="form-label">MUNICÍPIO:</label><input type="text" id="municipio" class="form-control" placeholder="Município"></div>
      <div class="form-group"><label class="form-label">COORDENADAS:</label><input type="text" id="coordenadas" class="form-control" placeholder="Coordenadas"></div>
      <div class="form-group"><label class="form-label">ATIVIDADE:</label><input type="text" id="atividade" class="form-control" placeholder="Atividade"></div>
      <div class="form-group"><label class="form-label">PROTOCOLO:</label><input type="text" id="protocolo" class="form-control" placeholder="Protocolo"></div>
    </div>
  </div>

  <!-- INFORMAÇÕES VISTORIA -->
  <div class="dashboard-card">
    <div class="card-header"><h3 class="card-title"><i class="fas fa-clipboard-list"></i> INFORMAÇÕES DA VISTORIA</h3></div>
    <div class="data-grid" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:15px;">
      <div class="form-group"><label>DIA:</label><input type="number" id="dia" class="form-control" placeholder="DD"></div>
      <div class="form-group"><label>MÊS:</label><input type="text" id="mes" class="form-control" placeholder="Mês"></div>
      <div class="form-group"><label>ANO:</label><input type="number" id="ano" class="form-control" placeholder="AAAA"></div>
      <div class="form-group"><label>SUBESTAÇÃO:</label><input type="text" id="subestacao" class="form-control" placeholder="Nome da subestação"></div>
      <div class="form-group"><label>EMPRESA:</label><input type="text" id="empresa" class="form-control" placeholder="Nome da empresa"></div>
    </div>
    <div class="form-group"><label>TÉCNICOS:</label><div id="tecnicos-container"></div><button type="button" class="btn-add-field no-print" onclick="adicionarTecnico()"><i class="fas fa-plus"></i> Adicionar Técnico</button></div>
    <div class="form-group"><label>REPRESENTANTES:</label><div id="representantes-container"></div><button type="button" class="btn-add-field no-print" onclick="adicionarRepresentante()"><i class="fas fa-plus"></i> Adicionar Representante</button></div>
  </div>

  <!-- DESCRIÇÃO PREVIEW -->
  <div class="dashboard-card">
    <div class="card-header"><h3 class="card-title"><i class="fas fa-file-alt"></i> DESCRIÇÃO DA VISTORIA (PREVIEW)</h3></div>
    <div class="texto-preview" id="textoPreview"><h5>DESCRIÇÃO:</h5><p style="color:#666;">Preencha os dados acima.</p></div>
  </div>

  <!-- CONSTATAÇÕES -->
  <div class="dashboard-card">
    <div class="card-header"><h3 class="card-title"><i class="fas fa-search"></i> CONSTATAÇÕES</h3></div>
    <div class="checkbox-group">
      <div class="checkbox-container" id="container-inconformidades">
        <div class="checkbox-option"><input type="checkbox" id="inconformidades"> <label class="checkbox-text"><strong>Foram identificadas inconformidades, consistindo em:</strong></label></div>
        <div class="checkbox-description" id="desc-inconformidades"><textarea id="descricaoInconformidades" placeholder="Descreva as inconformidades..."></textarea></div>
      </div>
      <div class="checkbox-container" id="container-sem-inconformidades">
        <div class="checkbox-option"><input type="checkbox" id="semInconformidades"> <label class="checkbox-text"><strong>Não foram identificadas inconformidades.</strong></label></div>
        <div class="checkbox-description" id="desc-sem-inconformidades"><textarea id="descricaoSemInconformidades" placeholder="Descreva condições de conformidade..."></textarea></div>
      </div>
    </div>
  </div>

  <!-- REGISTROS FOTOGRÁFICOS (após CONSTATAÇÕES) -->
  <div class="dashboard-card">
    <div class="card-header"><h3 class="card-title"><i class="fas fa-camera"></i> REGISTROS FOTOGRÁFICOS <span class="badge bg-primary rounded-pill" id="foto-counter">0</span></h3></div>
    <div class="foto-gallery" id="foto-gallery"></div>
    <input type="file" id="fotoInput" class="file-input-hidden" style="display:none" accept="image/*" capture="environment" multiple>
    <div class="row no-print" style="margin-top:20px;">
      <div class="col-md-6 mb-2"><button type="button" class="btn-add-field" style="width:100%; justify-content:center;" onclick="abrirCamera()"><i class="fas fa-camera"></i> Tirar Foto</button></div>
      <div class="col-md-6 mb-2"><button type="button" class="btn-add-field" style="width:100%; background:#17a2b8;" onclick="abrirGaleria()"><i class="fas fa-images"></i> Escolher da Galeria</button></div>
    </div>
  </div>

  <!-- CONCLUSÃO -->
  <div class="dashboard-card">
    <div class="card-header"><h3 class="card-title"><i class="fas fa-check-circle"></i> CONCLUSÃO</h3></div>
    <div class="form-group"><label>CONFORMIDADES IDENTIFICADAS:</label><div id="conformidades-container"></div><button class="btn-add-field" onclick="adicionarConformidade()"><i class="fas fa-plus"></i> Adicionar Conformidade</button></div>
    <div class="form-group"><label>INCONFORMIDADES IDENTIFICADAS (QUANDO APLICÁVEL):</label><div id="inconformidades-container"></div><button class="btn-add-field" onclick="adicionarInconformidade()"><i class="fas fa-plus"></i> Adicionar Inconformidade</button></div>
    <div class="form-group"><label>OBSERVAÇÕES ADICIONAIS:</label><textarea id="observacoesAdicionais" class="large-textarea" rows="3" placeholder="Observações..."></textarea></div>
  </div>

  <!-- ASSINATURA -->
  <div class="assinatura-container">
    <div class="form-group"><label>VISTORIADOR (A):</label><input type="text" id="assinaturaVistoriador" class="form-control" placeholder="Nome completo"></div>
    <div class="form-group"><label>CARGO:</label><input type="text" id="cargoVistoriador" class="form-control" value="Engenheiro/Responsável Técnico"></div>
    <div class="assinatura-line"><div class="assinatura-text">ASSINATURA</div></div>
  </div>

  <div class="btn-group-custom no-print">
    <button class="btn-custom btn-save" onclick="salvarFormulario()"><i class="fas fa-save"></i> Salvar</button>
    <button class="btn-custom btn-load" onclick="carregarFormulario()"><i class="fas fa-folder-open"></i> Carregar</button>
    <button class="btn-custom btn-pdf" onclick="gerarPDF()"><i class="fas fa-file-pdf"></i> Gerar PDF</button>
    <button class="btn-custom btn-clear" onclick="limparFormulario()"><i class="fas fa-trash-alt"></i> Limpar</button>
  </div>
  <div class="dashboard-footer text-center mt-4 text-muted small">Documento oficial - ERCBA/IAT</div>
</div>
<div class="status-bar" id="statusBar"></div>

<script>
  let tecnicos = [], representantes = [], conformidades = [], inconformidades = [], fotos = [];
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

  document.addEventListener('DOMContentLoaded', () => {
    const hoje = new Date();
    const meses = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
    document.getElementById('dia').value = hoje.getDate();
    document.getElementById('mes').value = meses[hoje.getMonth()];
    document.getElementById('ano').value = hoje.getFullYear();

    // Controle checkboxes
    const chkInc = document.getElementById('inconformidades');
    const chkSem = document.getElementById('semInconformidades');
    const descInc = document.getElementById('desc-inconformidades');
    const descSem = document.getElementById('desc-sem-inconformidades');
    chkInc.onchange = () => { if(chkInc.checked) { chkSem.checked=false; descInc.style.display='block'; descSem.style.display='none'; document.getElementById('container-inconformidades').classList.add('checked'); document.getElementById('container-sem-inconformidades').classList.remove('checked'); } else { descInc.style.display='none'; document.getElementById('container-inconformidades').classList.remove('checked'); } atualizarTextoGerado(); };
    chkSem.onchange = () => { if(chkSem.checked) { chkInc.checked=false; descSem.style.display='block'; descInc.style.display='none'; document.getElementById('container-sem-inconformidades').classList.add('checked'); document.getElementById('container-inconformidades').classList.remove('checked'); } else { descSem.style.display='none'; document.getElementById('container-sem-inconformidades').classList.remove('checked'); } atualizarTextoGerado(); };
    descInc.style.display = 'none'; descSem.style.display = 'none';

    document.getElementById('fotoInput').addEventListener('change', (e) => processarArquivos(e.target.files));
    renderizarTecnicos(); renderizarRepresentantes(); renderizarConformidades(); renderizarInconformidades(); renderizarFotos();
    atualizarTextoGerado();
    setTimeout(() => carregarFormulario(), 200);
  });

  function atualizarTextoGerado() {
    const dia = document.getElementById('dia').value || '___';
    const mes = document.getElementById('mes').value || '_______';
    const ano = document.getElementById('ano').value || '____';
    const empresa = document.getElementById('empresa').value || 'empresa';
    const tecnicosVal = tecnicos.filter(t => t.trim());
    let listaTecnicos = '';
    if(tecnicosVal.length===1) listaTecnicos = `pelo técnico ${tecnicosVal[0]}`;
    else if(tecnicosVal.length===2) listaTecnicos = `pelos técnicos ${tecnicosVal[0]} e ${tecnicosVal[1]}`;
    else if(tecnicosVal.length>2) { let ult = tecnicosVal.pop(); listaTecnicos = `pelos técnicos ${tecnicosVal.join(', ')} e ${ult}`; tecnicosVal.push(ult); }
    let listaRep = '';
    const repsVal = representantes.filter(r=>r.trim());
    if(repsVal.length===1) listaRep = `pelo funcionário da ${empresa} ${repsVal[0]}`;
    else if(repsVal.length===2) listaRep = `pelos funcionários da ${empresa} ${repsVal[0]} e ${repsVal[1]}`;
    else if(repsVal.length>2) { let ult = repsVal.pop(); listaRep = `pelos funcionários da ${empresa} ${repsVal.join(', ')} e ${ult}`; repsVal.push(ult); }

    let textoConst = '';
    const temInc = document.getElementById('inconformidades').checked;
    const semInc = document.getElementById('semInconformidades').checked;
    const descIncTexto = document.getElementById('descricaoInconformidades').value.trim();
    const descSemTexto = document.getElementById('descricaoSemInconformidades').value.trim();

    if(temInc && descIncTexto) textoConst = `Na subestação foram encontradas algumas inconformidades como: ${descIncTexto.toLowerCase()}. `;
    else if(semInc) textoConst = descSemTexto ? descSemTexto : 'Não foram encontradas inconformidades durante a vistoria.';

    let textoBase = `A vistoria foi realizada no dia ${dia} de ${mes} de ${ano}`;
    if(listaTecnicos) textoBase += `, ${listaTecnicos}`;
    if(listaRep) textoBase += `, e acompanhada ${listaRep}`;
    textoBase += `. ${textoConst}`;

    // IMPORTANTE: a frase "Segue abaixo registros fotográficos" só aparece APÓS as constatações, dentro do preview textual,
    // mas também será inserida corretamente no PDF antes da galeria, conforme solicitado.
    // Aqui mantemos coerência: se houver fotos, adicionamos a frase no final do texto descritivo, depois da parte de constatações.
    if(fotos.length > 0) {
      textoBase += ` Segue abaixo registros fotográficos do empreendimento:`;
    }

    document.getElementById('textoPreview').innerHTML = `<h5>DESCRIÇÃO:</h5>${textoBase}`;
  }

  // Funções dinâmicas (tecnicos, representantes, fotos, etc)
  function adicionarTecnico() { tecnicos.push(""); renderizarTecnicos(); atualizarTextoGerado(); }
  function atualizarTecnicoInput(idx, val) { tecnicos[idx]=val; atualizarTextoGerado(); }
  function removerTecnico(idx) { tecnicos.splice(idx,1); renderizarTecnicos(); atualizarTextoGerado(); }
  function renderizarTecnicos() { const cont = document.getElementById('tecnicos-container'); cont.innerHTML=''; tecnicos.forEach((t,i)=>{ let div=document.createElement('div'); div.className='field-item'; div.innerHTML=`<div class="field-number">${i+1}</div><input class="field-input" value="${escapeHtml(t)}" oninput="atualizarTecnicoInput(${i}, this.value)"><button class="btn-remove-field" onclick="removerTecnico(${i})"><i class="fas fa-trash"></i> Remover</button>`; cont.appendChild(div); }); }
  function adicionarRepresentante() { representantes.push(""); renderizarRepresentantes(); atualizarTextoGerado(); }
  function atualizarRepresentanteInput(idx,val) { representantes[idx]=val; atualizarTextoGerado(); }
  function removerRepresentante(idx) { representantes.splice(idx,1); renderizarRepresentantes(); atualizarTextoGerado(); }
  function renderizarRepresentantes() { const cont = document.getElementById('representantes-container'); cont.innerHTML=''; representantes.forEach((r,i)=>{ let div=document.createElement('div'); div.className='field-item'; div.innerHTML=`<div class="field-number">${i+1}</div><input class="field-input" value="${escapeHtml(r)}" oninput="atualizarRepresentanteInput(${i}, this.value)"><button class="btn-remove-field" onclick="removerRepresentante(${i})"><i class="fas fa-trash"></i> Remover</button>`; cont.appendChild(div); }); }
  function adicionarConformidade() { conformidades.push(""); renderizarConformidades(); }
  function atualizarConformidade(idx,val) { conformidades[idx]=val; }
  function removerConformidade(idx) { conformidades.splice(idx,1); renderizarConformidades(); }
  function renderizarConformidades() { const cont = document.getElementById('conformidades-container'); cont.innerHTML=''; conformidades.forEach((c,i)=>{ let div=document.createElement('div'); div.className='field-item'; div.innerHTML=`<div class="field-number">${i+1}</div><input class="field-input" value="${escapeHtml(c)}" oninput="atualizarConformidade(${i}, this.value)"><button class="btn-remove-field" onclick="removerConformidade(${i})"><i class="fas fa-trash"></i> Remover</button>`; cont.appendChild(div); }); }
  function adicionarInconformidade() { inconformidades.push(""); renderizarInconformidades(); }
  function atualizarInconformidade(idx,val) { inconformidades[idx]=val; }
  function removerInconformidade(idx) { inconformidades.splice(idx,1); renderizarInconformidades(); }
  function renderizarInconformidades() { const cont = document.getElementById('inconformidades-container'); cont.innerHTML=''; inconformidades.forEach((inc,i)=>{ let div=document.createElement('div'); div.className='field-item'; div.innerHTML=`<div class="field-number">${i+1}</div><input class="field-input" value="${escapeHtml(inc)}" oninput="atualizarInconformidade(${i}, this.value)"><button class="btn-remove-field" onclick="removerInconformidade(${i})"><i class="fas fa-trash"></i> Remover</button>`; cont.appendChild(div); }); }
  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // Fotos
  function abrirCamera() { let inp = document.getElementById('fotoInput'); if(isIOS) inp.setAttribute('capture','environment'); else inp.removeAttribute('capture'); inp.removeAttribute('multiple'); inp.click(); }
  function abrirGaleria() { let inp = document.getElementById('fotoInput'); inp.removeAttribute('capture'); if(!isIOS) inp.setAttribute('multiple','multiple'); inp.click(); }
  function processarArquivos(files) { if(!files) return; Array.from(files).forEach(file=>{ if(file.type.startsWith('image/')){ let reader=new FileReader(); reader.onload=e=>{ fotos.push({id:Date.now()+Math.random(), dataUrl:e.target.result, descricao:''}); renderizarFotos(); atualizarTextoGerado(); mostrarStatus('Foto adicionada'); }; reader.readAsDataURL(file); } }); }
  function removerFoto(idx) { if(confirm('Remover foto?')){ fotos.splice(idx,1); renderizarFotos(); atualizarTextoGerado(); } }
  function atualizarDescFoto(idx, desc) { if(fotos[idx]) fotos[idx].descricao=desc; }
  function renderizarFotos() { const gal=document.getElementById('foto-gallery'); gal.innerHTML=''; fotos.forEach((f,i)=>{ let div=document.createElement('div'); div.className='foto-item'; div.innerHTML=`<div class="foto-preview"><img src="${f.dataUrl}"><div class="foto-number">${i+1}</div><div class="foto-actions"><button class="foto-action-btn" onclick="removerFoto(${i})"><i class="fas fa-trash"></i></button></div></div><div class="foto-description"><input type="text" placeholder="Descrição da foto..." value="${escapeHtml(f.descricao)}" oninput="atualizarDescFoto(${i}, this.value)"></div>`; gal.appendChild(div); }); document.getElementById('foto-counter').innerText=fotos.length; }

  // Salvamento
  function salvarFormulario() { let dados={ interessado:getVal('interessado'), assunto:getVal('assunto'), municipio:getVal('municipio'), coordenadas:getVal('coordenadas'), atividade:getVal('atividade'), protocolo:getVal('protocolo'), dia:getVal('dia'), mes:getVal('mes'), ano:getVal('ano'), subestacao:getVal('subestacao'), empresa:getVal('empresa'), tecnicos, representantes, inconformidadesCheck:document.getElementById('inconformidades').checked, semInconformidadesCheck:document.getElementById('semInconformidades').checked, descricaoInconformidades:getVal('descricaoInconformidades'), descricaoSemInconformidades:getVal('descricaoSemInconformidades'), fotos, conformidades, inconformidades, observacoesAdicionais:getVal('observacoesAdicionais'), assinaturaVistoriador:getVal('assinaturaVistoriador'), cargoVistoriador:getVal('cargoVistoriador') }; localStorage.setItem('relatorioVistoriaSubestacao',JSON.stringify(dados)); mostrarStatus('Salvo!'); }
  function carregarFormulario() { let raw=localStorage.getItem('relatorioVistoriaSubestacao'); if(!raw) return; let d=JSON.parse(raw); setVal('interessado',d.interessado); setVal('assunto',d.assunto); setVal('municipio',d.municipio); setVal('coordenadas',d.coordenadas); setVal('atividade',d.atividade); setVal('protocolo',d.protocolo); setVal('dia',d.dia); setVal('mes',d.mes); setVal('ano',d.ano); setVal('subestacao',d.subestacao); setVal('empresa',d.empresa); tecnicos=d.tecnicos||[]; representantes=d.representantes||[]; document.getElementById('inconformidades').checked=d.inconformidadesCheck||false; document.getElementById('semInconformidades').checked=d.semInconformidadesCheck||false; setVal('descricaoInconformidades',d.descricaoInconformidades); setVal('descricaoSemInconformidades',d.descricaoSemInconformidades); fotos=d.fotos||[]; conformidades=d.conformidades||[]; inconformidades=d.inconformidades||[]; setVal('observacoesAdicionais',d.observacoesAdicionais); setVal('assinaturaVistoriador',d.assinaturaVistoriador); setVal('cargoVistoriador',d.cargoVistoriador||'Engenheiro/Responsável Técnico'); renderizarTecnicos(); renderizarRepresentantes(); renderizarConformidades(); renderizarInconformidades(); renderizarFotos(); atualizarTextoGerado(); mostrarStatus('Carregado'); }
  function getVal(id){ return document.getElementById(id)?.value||''; }
  function setVal(id,val){ let el=document.getElementById(id); if(el) el.value=val||''; }

  function gerarPDF() {
    mostrarStatus('Gerando PDF...');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    const margin=25, contentW=160;
    let y=25;
    function addHeader(){ try{ pdf.addImage('https://upload.wikimedia.org/wikipedia/pt/b/ba/Logo_IAT_PR.png','PNG',margin,10,25,20); pdf.addImage('https://image2url.com/r2/default/images/1770223607016-99c57976-38bc-462d-aaac-01c87703b919.png','PNG',185,10,20,18); }catch(e){} pdf.setFont('helvetica','bold'); pdf.setFontSize(14); pdf.text('DIVISÃO DE LICENCIAMENTO ESTRATÉGICO',105,15,{align:'center'}); pdf.setFontSize(12); pdf.text('RELATÓRIO DE VISTORIA TÉCNICA',105,22,{align:'center'}); pdf.line(margin,28,210-margin,28); }
    function addFooter(p,t){ let hoje=new Date().toLocaleDateString('pt-BR'); pdf.setFontSize(8); pdf.text('IAT - Instituto Água e Terra',margin,285); pdf.text(`Página ${p} de ${t}`,210-margin,285,{align:'right'}); }
    addHeader(); y=35;
    // Identificação
    pdf.setFont('helvetica','bold'); pdf.text('IDENTIFICAÇÃO DO EMPREENDIMENTO',margin,y); y+=6;
    pdf.setFont('helvetica','normal'); pdf.text(`Interessado: ${getVal('interessado')||'-'}`,margin,y); y+=5;
    pdf.text(`Assunto: ${getVal('assunto')||'-'}`,margin,y); y+=5;
    pdf.text(`Município: ${getVal('municipio')||'-'}`,margin,y); y+=5;
    pdf.text(`Coordenadas: ${getVal('coordenadas')||'-'}`,margin,y); y+=5;
    pdf.text(`Atividade: ${getVal('atividade')||'-'}`,margin,y); y+=5;
    pdf.text(`Protocolo: ${getVal('protocolo')||'-'}`,margin,y); y+=8;
    // Descrição
    pdf.setFont('helvetica','bold'); pdf.text('DESCRIÇÃO DA VISTORIA',margin,y); y+=6;
    pdf.setFont('helvetica','normal');
    let textoDesc = document.getElementById('textoPreview').innerText.replace('DESCRIÇÃO:','').trim();
    let lines = pdf.splitTextToSize(textoDesc, contentW);
    lines.forEach(l=>{ if(y>270){ pdf.addPage(); addHeader(); y=35; } pdf.text(l,margin,y); y+=5; }); y+=4;
    // CONSTATAÇÕES (título)
    pdf.setFont('helvetica','bold'); pdf.text('CONSTATAÇÕES',margin,y); y+=6;
    pdf.setFont('helvetica','normal');
    let constTxt='';
    if(document.getElementById('inconformidades').checked) constTxt = getVal('descricaoInconformidades')||'Inconformidades registradas.';
    else if(document.getElementById('semInconformidades').checked) constTxt = getVal('descricaoSemInconformidades')||'Nenhuma inconformidade identificada.';
    else constTxt = 'Nenhuma constatação registrada.';
    let constLines = pdf.splitTextToSize(constTxt, contentW);
    constLines.forEach(l=>{ if(y>270){ pdf.addPage(); addHeader(); y=35; } pdf.text(l,margin,y); y+=5; }); y+=4;
    // REGISTROS FOTOGRÁFICOS (somente se houver fotos) - com a frase exata após CONSTATAÇÕES
    if(fotos.length>0){
      pdf.setFont('helvetica','bold'); pdf.text('REGISTROS FOTOGRÁFICOS',margin,y); y+=6;
      pdf.setFont('helvetica','normal'); pdf.text('Segue abaixo registros fotográficos do empreendimento:',margin,y); y+=8;
      for(let i=0;i<fotos.length;i++){
        try{
          let imgData = fotos[i].dataUrl;
          let img = new Image(); let loaded=false;
          await new Promise((resolve)=>{
            img.onload=()=>{ 
              let w=70, h=50; let xPos=(210-w)/2;
              if(y+h>270){ pdf.addPage(); addHeader(); y=35; }
              pdf.addImage(img, 'JPEG', xPos, y, w, h);
              y+=h+8;
              pdf.setFontSize(10); pdf.text(`Foto ${i+1}: ${fotos[i].descricao||'Registro'}`,margin,y-4);
              resolve();
            };
            img.onerror=resolve;
            img.src=imgData;
          });
        }catch(e){ console.warn(e); }
      }
    }
    // Conclusão e assinatura
    if(y>250){ pdf.addPage(); addHeader(); y=35; }
    pdf.setFont('helvetica','bold'); pdf.text('CONCLUSÃO',margin,y); y+=6;
    pdf.setFont('helvetica','normal'); pdf.text('Com base na vistoria técnica realizada:',margin,y); y+=5;
    let consList = conformidades.filter(c=>c.trim());
    if(consList.length){ pdf.text('Conformidades identificadas:',margin,y); y+=5; consList.forEach((c,i)=>{ pdf.text(`${i+1}. ${c}`,margin+5,y); y+=5; }); }
    let incList = inconformidades.filter(i=>i.trim());
    if(incList.length){ pdf.text('Inconformidades identificadas:',margin,y); y+=5; incList.forEach((inc,i)=>{ pdf.text(`${i+1}. ${inc}`,margin+5,y); y+=5; }); }
    let obs = getVal('observacoesAdicionais'); if(obs){ pdf.text('Observações adicionais:',margin,y); y+=5; let obsLines=pdf.splitTextToSize(obs,contentW); obsLines.forEach(l=>{ pdf.text(l,margin,y); y+=5; }); }
    y+=10; pdf.setFont('helvetica','bold'); pdf.text('ASSINATURA',margin,y); y+=8;
    pdf.setFont('helvetica','normal'); pdf.text(`Vistoriador(a): ${getVal('assinaturaVistoriador')||'____________________'}`,margin,y); y+=6;
    pdf.text(`Cargo: ${getVal('cargoVistoriador')||'Engenheiro'}`,margin,y); y+=12;
    pdf.line(margin,y,210-margin,y); y+=4; pdf.text('Assinatura',105,y,{align:'center'});
    let total = pdf.internal.getNumberOfPages();
    for(let i=1;i<=total;i++){ pdf.setPage(i); addFooter(i,total); }
    pdf.save(`Relatorio_${getVal('protocolo')||'vistoria'}.pdf`);
    mostrarStatus('PDF gerado!');
  }

  function limparFormulario(){ if(confirm('Limpar tudo?')){ localStorage.removeItem('relatorioVistoriaSubestacao'); location.reload(); } }
  function mostrarStatus(msg, tipo='success'){ let sb=document.getElementById('statusBar'); sb.innerText=msg; sb.style.display='block'; setTimeout(()=>sb.style.display='none',2500); }
  window.adicionarTecnico=adicionarTecnico; window.adicionarRepresentante=adicionarRepresentante; window.adicionarConformidade=adicionarConformidade; window.adicionarInconformidade=adicionarInconformidade; window.removerTecnico=removerTecnico; window.removerRepresentante=removerRepresentante; window.removerConformidade=removerConformidade; window.removerInconformidade=removerInconformidade; window.removerFoto=removerFoto; window.atualizarDescFoto=atualizarDescFoto; window.atualizarTecnicoInput=atualizarTecnicoInput; window.atualizarRepresentanteInput=atualizarRepresentanteInput; window.atualizarConformidade=atualizarConformidade; window.atualizarInconformidade=atualizarInconformidade; window.abrirCamera=abrirCamera; window.abrirGaleria=abrirGaleria; window.salvarFormulario=salvarFormulario; window.carregarFormulario=carregarFormulario; window.gerarPDF=gerarPDF; window.limparFormulario=limparFormulario;
</script>
