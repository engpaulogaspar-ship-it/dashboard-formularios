<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Relatório de Vistoria Técnica - Subestação</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #003366;
      --secondary-color: #0056b3;
      --accent-color: #28a745;
      --light-bg: #f8fafc;
      --card-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
      --border-radius: 12px;
    }

    body {
      font-family: 'Arial', 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      min-height: 100vh;
      padding: 20px 10px;
      color: #333;
    }

    .dashboard-container { max-width: 1400px; margin: 0 auto; }
    .dashboard-header {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 20px 30px;
      border-radius: var(--border-radius);
      margin-bottom: 30px;
      box-shadow: var(--card-shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 140px;
      position: relative;
    }
    .logo-img { height: 90px; width: auto; background: white; padding: 10px; border-radius: 10px; object-fit: contain; }
    .org-info { text-align: center; flex: 1; padding: 0 30px; }
    .org-title { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
    .report-title { font-size: 16px; background: rgba(255,255,255,0.15); padding: 8px 20px; border-radius: 8px; display: inline-block; }
    .dashboard-card {
      background: white;
      border-radius: var(--border-radius);
      padding: 25px;
      box-shadow: var(--card-shadow);
      margin-bottom: 25px;
      transition: transform 0.3s ease;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }
    .card-title { font-size: 18px; font-weight: 700; color: var(--primary-color); margin: 0; display: flex; gap: 10px; align-items: center; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 25px; }
    .form-group { margin-bottom: 20px; }
    .form-label { font-weight: 600; color: #495057; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .form-control, .field-input, .large-textarea {
      border: 2px solid #e9ecef;
      border-radius: 8px;
      padding: 12px 15px;
      width: 100%;
      transition: all 0.3s;
      font-size: 15px;
    }
    .form-control:focus, .field-input:focus, .large-textarea:focus {
      border-color: var(--primary-color);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,51,102,0.1);
    }
    .texto-preview {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      border: 2px solid #e9ecef;
      margin: 20px 0;
      font-size: 15px;
      line-height: 1.6;
      text-align: justify;
      white-space: pre-line;
      max-height: 300px;
      overflow-y: auto;
    }
    .checkbox-group { display: flex; flex-direction: column; gap: 20px; margin: 20px 0; }
    .checkbox-container { background: #f8f9fa; padding: 20px; border-radius: 10px; border: 2px solid #e9ecef; transition: all 0.3s; }
    .checkbox-container.checked { border-color: var(--primary-color); background: rgba(0,51,102,0.05); }
    .checkbox-option { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; margin-bottom: 15px; }
    .checkbox-option input[type="checkbox"] { width: 22px; height: 22px; margin-top: 3px; accent-color: var(--primary-color); }
    .checkbox-description { margin-top: 15px; padding-left: 32px; }
    .checkbox-description textarea { width: 100%; min-height: 100px; border-radius: 8px; padding: 12px; border: 2px solid #e9ecef; }
    .foto-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
    @media (max-width: 1200px) { .foto-gallery { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px) { .foto-gallery { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .foto-gallery { grid-template-columns: 1fr; } }
    .foto-item { background: #f8f9fa; border-radius: 8px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.1); position: relative; }
    .foto-preview { width: 100%; height: 150px; background: #e9ecef; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .foto-preview img { width: 100%; height: 100%; object-fit: cover; }
    .foto-number { position: absolute; top: 8px; left: 8px; background: var(--primary-color); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 2; }
    .foto-actions { position: absolute; top: 8px; right: 8px; z-index: 3; opacity: 0; transition: 0.2s; }
    .foto-item:hover .foto-actions { opacity: 1; }
    .foto-action-btn { background: rgba(0,0,0,0.7); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
    .foto-description { padding: 12px; background: white; border-top: 1px solid #e9ecef; }
    .foto-description input { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 8px; font-size: 13px; }
    .btn-add-field {
      background: linear-gradient(135deg, #6610f2, #6f42c1);
      color: white; padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600;
      display: inline-flex; align-items: center; gap: 8px; cursor: pointer; margin-top: 10px;
    }
    .btn-remove-field { background: #dc3545; color: white; border: none; border-radius: 6px; padding: 6px 14px; margin-left: 10px; cursor: pointer; }
    .field-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .field-number { background: var(--primary-color); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
    .field-input { flex: 1; }
    .btn-group-custom { display: flex; gap: 15px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
    .btn-custom { padding: 12px 24px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .btn-save { background: #28a745; color: white; }
    .btn-load { background: #17a2b8; color: white; }
    .btn-pdf { background: #dc3545; color: white; }
    .btn-clear { background: #6c757d; color: white; }
    .status-bar { position: fixed; bottom: 25px; right: 25px; background: #28a745; color: white; padding: 12px 20px; border-radius: 10px; display: none; z-index: 1000; font-weight: 500; }
    .assinatura-container { background: white; padding: 30px; border-radius: 12px; border: 2px solid #e9ecef; margin-top: 20px; }
    .assinatura-line { height: 2px; background: #333; margin-top: 50px; position: relative; }
    .assinatura-text { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: white; padding: 0 20px; }
    @media print { .no-print { display: none; } body { background: white; } }
  </style>
</head>
<body>
<div class="dashboard-container">
  <div class="dashboard-header">
    <div class="logo-left"><img src="https://upload.wikimedia.org/wikipedia/pt/b/ba/Logo_IAT_PR.png" class="logo-img" alt="Logo"></div>
    <div class="org-info"><h1 class="org-title">DIVISÃO DE LICENCIAMENTO ESTRATÉGICO</h1><div class="report-title">RELATÓRIO DE VISTORIA TÉCNICA</div></div>
    <div class="logo-right"><img src="https://image2url.com/r2/default/images/1770223607016-99c57976-38bc-462d-aaac-01c87703b919.png" class="logo-img" alt="IAT"></div>
  </div>

  <!-- IDENTIFICAÇÃO -->
  <div class="dashboard-card">
    <div class="card-header"><h3 class="card-title"><i class="fas fa-fingerprint"></i> IDENTIFICAÇÃO DO EMPREENDIMENTO</h3></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">INTERESSADO:</label><input type="text" id="interessado" class="form-control" placeholder="Nome do interessado"></div>
      <div class="form-group"><label class="form-label">ASSUNTO:</label><input type="text" id="assunto" class="form-control" placeholder="Assunto da vistoria"></div>
      <div class="form-group"><label class="form-label">MUNICÍPIO:</label><input type="text" id="municipio" class="form-control" placeholder="Município"></div>
      <div class="form-group"><label class="form-label">COORDENADAS:</label><input type="text" id="coordenadas" class="form-control" placeholder="Coordenadas"></div>
      <div class="form-group"><label class="form-label">ATIVIDADE:</label><input type="text" id="atividade" class="form-control" placeholder="Atividade"></div>
      <div class="form-group"><label class="form-label">PROTOCOLO:</label><input type="text" id="protocolo" class="form-control" placeholder="Protocolo"></div>
    </div>
  </div>

  <!-- INFORMAÇÕES VISTORIA -->
  <div class="dashboard-card">
    <div class="card-header"><h3 class="card-title"><i class="fas fa-clipboard-list"></i> INFORMAÇÕES DA VISTORIA</h3></div>
    <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:15px;">
      <div class="form-group"><label>DIA:</label><input type="number" id="dia" class="form-control" placeholder="DD"></div>
      <div class="form-group"><label>MÊS:</label><input type="text" id="mes" class="form-control" placeholder="Mês"></div>
      <div class="form-group"><label>ANO:</label><input type="number" id="ano" class="form-control" placeholder="AAAA"></div>
      <div class="form-group"><label>SUBESTAÇÃO:</label><input type="text" id="subestacao" class="form-control" placeholder="Nome da subestação"></div>
      <div class="form-group"><label>EMPRESA:</label><input type="text" id="empresa" class="form-control" placeholder="Nome da empresa"></div>
    </div>
    <div class="form-group"><label>TÉCNICOS:</label><div id="tecnicos-container"></div><button type="button" class="btn-add-field no-print" onclick="window.adicionarTecnico()"><i class="fas fa-plus"></i> Adicionar Técnico</button></div>
    <div class="form-group"><label>REPRESENTANTES:</label><div id="representantes-container"></div><button type="button" class="btn-add-field no-print" onclick="window.adicionarRepresentante()"><i class="fas fa-plus"></i> Adicionar Representante</button></div>
  </div>

  <!-- DESCRIÇÃO PREVIEW -->
  <div class="dashboard-card">
    <div class="card-header"><h3 class="card-title"><i class="fas fa-file-alt"></i> DESCRIÇÃO DA VISTORIA (PREVIEW)</h3></div>
    <div class="texto-preview" id="textoPreview"><h5>DESCRIÇÃO:</h5><p style="color:#666;">Preencha os dados acima.</p></div>
  </div>

  <!-- CONSTATAÇÕES -->
  <div class="dashboard-card">
    <div class="card-header"><h3 class="card-title"><i class="fas fa-search"></i> CONSTATAÇÕES</h3></div>
    <div class="checkbox-group">
      <div class="checkbox-container" id="container-inconformidades">
        <div class="checkbox-option"><input type="checkbox" id="inconformidades"> <label class="checkbox-text"><strong>Foram identificadas inconformidades, consistindo em:</strong></label></div>
        <div class="checkbox-description" id="desc-inconformidades"><textarea id="descricaoInconformidades" placeholder="Descreva as inconformidades..."></textarea></div>
      </div>
      <div class="checkbox-container" id="container-sem-inconformidades">
        <div class="checkbox-option"><input type="checkbox" id="semInconformidades"> <label class="checkbox-text"><strong>Não foram identificadas inconformidades.</strong></label></div>
        <div class="checkbox-description" id="desc-sem-inconformidades"><textarea id="descricaoSemInconformidades" placeholder="Descreva condições de conformidade..."></textarea></div>
      </div>
    </div>
  </div>

  <!-- REGISTROS FOTOGRÁFICOS -->
  <div class="dashboard-card">
    <div class="card-header"><h3 class="card-title"><i class="fas fa-camera"></i> REGISTROS FOTOGRÁFICOS <span class="badge bg-primary rounded-pill" id="foto-counter">0</span></h3></div>
    <div class="foto-gallery" id="foto-gallery"></div>
    <input type="file" id="fotoInput" style="display:none" accept="image/*" capture="environment" multiple>
    <div class="row no-print" style="margin-top:20px;">
      <div class="col-md-6 mb-2"><button type="button" class="btn-add-field" style="width:100%; justify-content:center;" onclick="window.abrirCamera()"><i class="fas fa-camera"></i> Tirar Foto</button></div>
      <div class="col-md-6 mb-2"><button type="button" class="btn-add-field" style="width:100%; background:#17a2b8;" onclick="window.abrirGaleria()"><i class="fas fa-images"></i> Escolher da Galeria</button></div>
    </div>
  </div>

  <!-- CONCLUSÃO -->
  <div class="dashboard-card">
    <div class="card-header"><h3 class="card-title"><i class="fas fa-check-circle"></i> CONCLUSÃO</h3></div>
    <div class="form-group"><label>CONFORMIDADES IDENTIFICADAS:</label><div id="conformidades-container"></div><button class="btn-add-field" onclick="window.adicionarConformidade()"><i class="fas fa-plus"></i> Adicionar Conformidade</button></div>
    <div class="form-group"><label>INCONFORMIDADES IDENTIFICADAS:</label><div id="inconformidades-container"></div><button class="btn-add-field" onclick="window.adicionarInconformidade()"><i class="fas fa-plus"></i> Adicionar Inconformidade</button></div>
    <div class="form-group"><label>OBSERVAÇÕES ADICIONAIS:</label><textarea id="observacoesAdicionais" class="large-textarea" rows="3" placeholder="Observações..."></textarea></div>
  </div>

  <!-- ASSINATURA -->
  <div class="assinatura-container">
    <div class="form-group"><label>VISTORIADOR (A):</label><input type="text" id="assinaturaVistoriador" class="form-control" placeholder="Nome completo"></div>
    <div class="form-group"><label>CARGO:</label><input type="text" id="cargoVistoriador" class="form-control" value="Engenheiro/Responsável Técnico"></div>
    <div class="assinatura-line"><div class="assinatura-text">ASSINATURA</div></div>
  </div>

  <div class="btn-group-custom no-print">
    <button class="btn-custom btn-save" onclick="window.salvarFormulario()"><i class="fas fa-save"></i> Salvar</button>
    <button class="btn-custom btn-load" onclick="window.carregarFormulario()"><i class="fas fa-folder-open"></i> Carregar</button>
    <button class="btn-custom btn-pdf" onclick="window.gerarPDF()"><i class="fas fa-file-pdf"></i> Gerar PDF</button>
    <button class="btn-custom btn-clear" onclick="window.limparFormulario()"><i class="fas fa-trash-alt"></i> Limpar</button>
  </div>
  <div class="text-center mt-4 text-muted small">Documento oficial - ERCBA/IAT</div>
</div>
<div class="status-bar" id="statusBar"></div>

<script>
// Variáveis globais
let tecnicos = [];
let representantes = [];
let conformidades = [];
let inconformidades = [];
let fotos = [];
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

// Funções auxiliares
function getVal(id) { return document.getElementById(id)?.value || ''; }
function setVal(id, val) { let el = document.getElementById(id); if(el) el.value = val || ''; }

function mostrarStatus(mensagem, tipo = 'success') {
  const statusBar = document.getElementById('statusBar');
  statusBar.textContent = mensagem;
  statusBar.style.display = 'block';
  if (tipo === 'error') statusBar.style.background = '#dc3545';
  else if (tipo === 'info') statusBar.style.background = '#17a2b8';
  else statusBar.style.background = '#28a745';
  setTimeout(() => { statusBar.style.display = 'none'; }, 3000);
}

function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if(m === '&') return '&amp;';
    if(m === '<') return '&lt;';
    if(m === '>') return '&gt;';
    return m;
  });
}

// Funções de Técnicos
window.adicionarTecnico = function() {
  tecnicos.push('');
  renderizarTecnicos();
  atualizarTextoGerado();
};

window.atualizarTecnicoInput = function(idx, val) {
  tecnicos[idx] = val;
  atualizarTextoGerado();
};

window.removerTecnico = function(idx) {
  tecnicos.splice(idx, 1);
  renderizarTecnicos();
  atualizarTextoGerado();
};

function renderizarTecnicos() {
  const container = document.getElementById('tecnicos-container');
  if(!container) return;
  container.innerHTML = '';
  tecnicos.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'field-item';
    div.innerHTML = `
      <div class="field-number">${i+1}</div>
      <input class="field-input" value="${escapeHtml(t)}" oninput="window.atualizarTecnicoInput(${i}, this.value)">
      <button class="btn-remove-field" onclick="window.removerTecnico(${i})"><i class="fas fa-trash"></i> Remover</button>
    `;
    container.appendChild(div);
  });
}

// Representantes
window.adicionarRepresentante = function() {
  representantes.push('');
  renderizarRepresentantes();
  atualizarTextoGerado();
};

window.atualizarRepresentanteInput = function(idx, val) {
  representantes[idx] = val;
  atualizarTextoGerado();
};

window.removerRepresentante = function(idx) {
  representantes.splice(idx, 1);
  renderizarRepresentantes();
  atualizarTextoGerado();
};

function renderizarRepresentantes() {
  const container = document.getElementById('representantes-container');
  if(!container) return;
  container.innerHTML = '';
  representantes.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'field-item';
    div.innerHTML = `
      <div class="field-number">${i+1}</div>
      <input class="field-input" value="${escapeHtml(r)}" oninput="window.atualizarRepresentanteInput(${i}, this.value)">
      <button class="btn-remove-field" onclick="window.removerRepresentante(${i})"><i class="fas fa-trash"></i> Remover</button>
    `;
    container.appendChild(div);
  });
}

// Conformidades
window.adicionarConformidade = function() {
  conformidades.push('');
  renderizarConformidades();
};

window.atualizarConformidade = function(idx, val) {
  conformidades[idx] = val;
};

window.removerConformidade = function(idx) {
  conformidades.splice(idx, 1);
  renderizarConformidades();
};

function renderizarConformidades() {
  const container = document.getElementById('conformidades-container');
  if(!container) return;
  container.innerHTML = '';
  conformidades.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'field-item';
    div.innerHTML = `
      <div class="field-number">${i+1}</div>
      <input class="field-input" value="${escapeHtml(c)}" oninput="window.atualizarConformidade(${i}, this.value)">
      <button class="btn-remove-field" onclick="window.removerConformidade(${i})"><i class="fas fa-trash"></i> Remover</button>
    `;
    container.appendChild(div);
  });
}

// Inconformidades
window.adicionarInconformidade = function() {
  inconformidades.push('');
  renderizarInconformidades();
};

window.atualizarInconformidade = function(idx, val) {
  inconformidades[idx] = val;
};

window.removerInconformidade = function(idx) {
  inconformidades.splice(idx, 1);
  renderizarInconformidades();
};

function renderizarInconformidades() {
  const container = document.getElementById('inconformidades-container');
  if(!container) return;
  container.innerHTML = '';
  inconformidades.forEach((inc, i) => {
    const div = document.createElement('div');
    div.className = 'field-item';
    div.innerHTML = `
      <div class="field-number">${i+1}</div>
      <input class="field-input" value="${escapeHtml(inc)}" oninput="window.atualizarInconformidade(${i}, this.value)">
      <button class="btn-remove-field" onclick="window.removerInconformidade(${i})"><i class="fas fa-trash"></i> Remover</button>
    `;
    container.appendChild(div);
  });
}

// Fotos
window.abrirCamera = function() {
  const input = document.getElementById('fotoInput');
  if(isIOS) input.setAttribute('capture', 'environment');
  else input.removeAttribute('capture');
  input.removeAttribute('multiple');
  input.click();
};

window.abrirGaleria = function() {
  const input = document.getElementById('fotoInput');
  input.removeAttribute('capture');
  if(!isIOS) input.setAttribute('multiple', 'multiple');
  input.click();
};

window.removerFoto = function(idx) {
  if(confirm('Remover esta foto?')) {
    fotos.splice(idx, 1);
    renderizarFotos();
    atualizarTextoGerado();
    mostrarStatus('Foto removida');
  }
};

window.atualizarDescFoto = function(idx, desc) {
  if(fotos[idx]) fotos[idx].descricao = desc;
};

function renderizarFotos() {
  const gallery = document.getElementById('foto-gallery');
  if(!gallery) return;
  gallery.innerHTML = '';
  fotos.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'foto-item';
    div.innerHTML = `
      <div class="foto-preview">
        <img src="${f.dataUrl}" alt="Foto ${i+1}">
        <div class="foto-number">${i+1}</div>
        <div class="foto-actions">
          <button class="foto-action-btn" onclick="window.removerFoto(${i})"><i class="fas fa-trash"></i></button>
        </div>
      </div>
      <div class="foto-description">
        <input type="text" placeholder="Descrição da foto..." value="${escapeHtml(f.descricao)}" oninput="window.atualizarDescFoto(${i}, this.value)">
      </div>
    `;
    gallery.appendChild(div);
  });
  document.getElementById('foto-counter').innerText = fotos.length;
}

function processarArquivos(arquivos) {
  if(!arquivos || arquivos.length === 0) return;
  Array.from(arquivos).forEach(file => {
    if(file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = function(e) {
        fotos.push({
          id: Date.now() + Math.random(),
          dataUrl: e.target.result,
          descricao: ''
        });
        renderizarFotos();
        atualizarTextoGerado();
        mostrarStatus('Foto adicionada!');
      };
      reader.readAsDataURL(file);
    } else {
      mostrarStatus('Arquivo não é uma imagem', 'error');
    }
  });
}

// Atualizar texto gerado (com a frase das fotos após CONSTATAÇÕES)
function atualizarTextoGerado() {
  const dia = getVal('dia') || '___';
  const mes = getVal('mes') || '_______';
  const ano = getVal('ano') || '____';
  const empresa = getVal('empresa') || 'empresa';
  
  const tecnicosVal = tecnicos.filter(t => t.trim());
  let listaTecnicos = '';
  if(tecnicosVal.length === 1) listaTecnicos = `pelo técnico ${tecnicosVal[0]}`;
  else if(tecnicosVal.length === 2) listaTecnicos = `pelos técnicos ${tecnicosVal[0]} e ${tecnicosVal[1]}`;
  else if(tecnicosVal.length > 2) {
    const ultimo = tecnicosVal.pop();
    listaTecnicos = `pelos técnicos ${tecnicosVal.join(', ')} e ${ultimo}`;
    tecnicosVal.push(ultimo);
  }
  
  const repsVal = representantes.filter(r => r.trim());
  let listaRep = '';
  if(repsVal.length === 1) listaRep = `pelo funcionário da ${empresa} ${repsVal[0]}`;
  else if(repsVal.length === 2) listaRep = `pelos funcionários da ${empresa} ${repsVal[0]} e ${repsVal[1]}`;
  else if(repsVal.length > 2) {
    const ultimo = repsVal.pop();
    listaRep = `pelos funcionários da ${empresa} ${repsVal.join(', ')} e ${ultimo}`;
    repsVal.push(ultimo);
  }
  
  const temInc = document.getElementById('inconformidades')?.checked || false;
  const semInc = document.getElementById('semInconformidades')?.checked || false;
  const descIncTexto = getVal('descricaoInconformidades');
  const descSemTexto = getVal('descricaoSemInconformidades');
  
  let textoConst = '';
  if(temInc && descIncTexto) {
    textoConst = `Na subestação foram encontradas algumas inconformidades como: ${descIncTexto.toLowerCase()}. `;
  } else if(semInc) {
    textoConst = descSemTexto ? descSemTexto : 'Não foram encontradas inconformidades durante a vistoria.';
  }
  
  let textoBase = `A vistoria foi realizada no dia ${dia} de ${mes} de ${ano}`;
  if(listaTecnicos) textoBase += `, ${listaTecnicos}`;
  if(listaRep) textoBase += `, e acompanhada ${listaRep}`;
  textoBase += `. ${textoConst}`;
  
  // A frase das fotos vem DEPOIS das constatações, conforme solicitado
  if(fotos.length > 0) {
    textoBase += ` Segue abaixo registros fotográficos do empreendimento:`;
  }
  
  const preview = document.getElementById('textoPreview');
  if(preview) preview.innerHTML = `<h5>DESCRIÇÃO:</h5>${textoBase}`;
}

// Salvar e Carregar
window.salvarFormulario = function() {
  const dados = {
    interessado: getVal('interessado'), assunto: getVal('assunto'), municipio: getVal('municipio'),
    coordenadas: getVal('coordenadas'), atividade: getVal('atividade'), protocolo: getVal('protocolo'),
    dia: getVal('dia'), mes: getVal('mes'), ano: getVal('ano'), subestacao: getVal('subestacao'),
    empresa: getVal('empresa'), tecnicos, representantes,
    inconformidadesCheck: document.getElementById('inconformidades')?.checked || false,
    semInconformidadesCheck: document.getElementById('semInconformidades')?.checked || false,
    descricaoInconformidades: getVal('descricaoInconformidades'),
    descricaoSemInconformidades: getVal('descricaoSemInconformidades'),
    fotos, conformidades, inconformidades,
    observacoesAdicionais: getVal('observacoesAdicionais'),
    assinaturaVistoriador: getVal('assinaturaVistoriador'),
    cargoVistoriador: getVal('cargoVistoriador')
  };
  localStorage.setItem('relatorioVistoriaSubestacao', JSON.stringify(dados));
  mostrarStatus('Formulário salvo!');
};

window.carregarFormulario = function() {
  const raw = localStorage.getItem('relatorioVistoriaSubestacao');
  if(!raw) { mostrarStatus('Nenhum dado salvo', 'info'); return; }
  try {
    const d = JSON.parse(raw);
    setVal('interessado', d.interessado); setVal('assunto', d.assunto); setVal('municipio', d.municipio);
    setVal('coordenadas', d.coordenadas); setVal('atividade', d.atividade); setVal('protocolo', d.protocolo);
    setVal('dia', d.dia); setVal('mes', d.mes); setVal('ano', d.ano); setVal('subestacao', d.subestacao);
    setVal('empresa', d.empresa);
    tecnicos = d.tecnicos || [];
    representantes = d.representantes || [];
    document.getElementById('inconformidades').checked = d.inconformidadesCheck || false;
    document.getElementById('semInconformidades').checked = d.semInconformidadesCheck || false;
    setVal('descricaoInconformidades', d.descricaoInconformidades);
    setVal('descricaoSemInconformidades', d.descricaoSemInconformidades);
    fotos = d.fotos || [];
    conformidades = d.conformidades || [];
    inconformidades = d.inconformidades || [];
    setVal('observacoesAdicionais', d.observacoesAdicionais);
    setVal('assinaturaVistoriador', d.assinaturaVistoriador);
    setVal('cargoVistoriador', d.cargoVistoriador || 'Engenheiro/Responsável Técnico');
    
    renderizarTecnicos();
    renderizarRepresentantes();
    renderizarConformidades();
    renderizarInconformidades();
    renderizarFotos();
    atualizarTextoGerado();
    
    // Disparar eventos dos checkboxes
    if(d.inconformidadesCheck) document.getElementById('inconformidades').dispatchEvent(new Event('change'));
    if(d.semInconformidadesCheck) document.getElementById('semInconformidades').dispatchEvent(new Event('change'));
    
    mostrarStatus('Dados carregados!');
  } catch(e) { mostrarStatus('Erro ao carregar', 'error'); }
};

window.limparFormulario = function() {
  if(confirm('Tem certeza? Todos os dados serão perdidos!')) {
    localStorage.removeItem('relatorioVistoriaSubestacao');
    location.reload();
  }
};

// Gerar PDF simplificado e funcional
window.gerarPDF = async function() {
  mostrarStatus('Gerando PDF...', 'info');
  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const margin = 20;
    let y = 30;
    
    // Cabeçalho
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(14);
    pdf.text('DIVISÃO DE LICENCIAMENTO ESTRATÉGICO', 105, 20, { align: 'center' });
    pdf.setFontSize(12);
    pdf.text('RELATÓRIO DE VISTORIA TÉCNICA', 105, 27, { align: 'center' });
    pdf.line(margin, 32, 210 - margin, 32);
    
    y = 40;
    
    // Identificação
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(12);
    pdf.text('IDENTIFICAÇÃO DO EMPREENDIMENTO', margin, y);
    y += 7;
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(10);
    pdf.text(`Interessado: ${getVal('interessado') || '-'}`, margin, y); y += 5;
    pdf.text(`Assunto: ${getVal('assunto') || '-'}`, margin, y); y += 5;
    pdf.text(`Município: ${getVal('municipio') || '-'}`, margin, y); y += 5;
    pdf.text(`Protocolo: ${getVal('protocolo') || '-'}`, margin, y); y += 8;
    
    // Descrição
    pdf.setFont('helvetica', 'bold');
    pdf.text('DESCRIÇÃO DA VISTORIA', margin, y);
    y += 6;
    pdf.setFont('helvetica', 'normal');
    const textoDesc = document.getElementById('textoPreview')?.innerText.replace('DESCRIÇÃO:', '').trim() || 'Sem descrição';
    const lines = pdf.splitTextToSize(textoDesc, 170);
    lines.forEach(l => { if(y > 270) { pdf.addPage(); y = 20; } pdf.text(l, margin, y); y += 5; });
    y += 4;
    
    // CONSTATAÇÕES (título)
    pdf.setFont('helvetica', 'bold');
    pdf.text('CONSTATAÇÕES', margin, y);
    y += 6;
    pdf.setFont('helvetica', 'normal');
    let constTxt = '';
    if(document.getElementById('inconformidades')?.checked) constTxt = getVal('descricaoInconformidades') || 'Inconformidades registradas.';
    else if(document.getElementById('semInconformidades')?.checked) constTxt = getVal('descricaoSemInconformidades') || 'Nenhuma inconformidade identificada.';
    else constTxt = 'Nenhuma constatação registrada.';
    const constLines = pdf.splitTextToSize(constTxt, 170);
    constLines.forEach(l => { if(y > 270) { pdf.addPage(); y = 20; } pdf.text(l, margin, y); y += 5; });
    y += 4;
    
    // REGISTROS FOTOGRÁFICOS - com a frase solicitada
    if(fotos.length > 0) {
      if(y > 250) { pdf.addPage(); y = 20; }
      pdf.setFont('helvetica', 'bold');
      pdf.text('REGISTROS FOTOGRÁFICOS', margin, y);
      y += 6;
      pdf.setFont('helvetica', 'normal');
      pdf.text('Segue abaixo registros fotográficos do empreendimento:', margin, y);
      y += 8;
      
      for(let i = 0; i < fotos.length; i++) {
        if(y > 250) { pdf.addPage(); y = 20; }
        try {
          const imgData = fotos[i].dataUrl;
          await new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              const maxW = 140, maxH = 90;
              let w = img.width, h = img.height;
              const ratio = Math.min(maxW / w, maxH / h);
              w = w * ratio;
              h = h * ratio;
              const x = (210 - w) / 2;
              pdf.addImage(img, 'JPEG', x, y, w, h);
              y += h + 6;
              pdf.setFontSize(9);
              pdf.text(`Foto ${i+1}: ${fotos[i].descricao || 'Registro fotográfico'}`, margin, y - 2);
              resolve();
            };
            img.onerror = resolve;
            img.src = imgData;
          });
        } catch(e) { console.warn(e); }
      }
      y += 5;
    }
    
    // Conclusão
    if(y > 250) { pdf.addPage(); y = 20; }
    pdf.setFont('helvetica', 'bold');
    pdf.text('CONCLUSÃO', margin, y);
    y += 6;
    pdf.setFont('helvetica', 'normal');
    pdf.text('Com base na vistoria técnica realizada:', margin, y);
    y += 5;
    
    const consVal = conformidades.filter(c => c.trim());
    if(consVal.length) {
      pdf.text('Conformidades identificadas:', margin, y); y += 5;
      consVal.forEach((c, i) => { pdf.text(`${i+1}. ${c}`, margin + 5, y); y += 5; });
    }
    const incVal = inconformidades.filter(i => i.trim());
    if(incVal.length) {
      pdf.text('Inconformidades identificadas:', margin, y); y += 5;
      incVal.forEach((inc, i) => { pdf.text(`${i+1}. ${inc}`, margin + 5, y); y += 5; });
    }
    const obs = getVal('observacoesAdicionais');
    if(obs) {
      pdf.text('Observações adicionais:', margin, y); y += 5;
      const obsLines = pdf.splitTextToSize(obs, 170);
      obsLines.forEach(l => { pdf.text(l, margin, y); y += 5; });
    }
    
    y += 10;
    pdf.setFont('helvetica', 'bold');
    pdf.text('ASSINATURA', margin, y);
    y += 8;
    pdf.setFont('helvetica', 'normal');
    pdf.text(`Vistoriador(a): ${getVal('assinaturaVistoriador') || '____________________'}`, margin, y); y += 6;
    pdf.text(`Cargo: ${getVal('cargoVistoriador') || 'Engenheiro'}`, margin, y); y += 12;
    pdf.line(margin, y, 210 - margin, y);
    y += 4;
    pdf.text('Assinatura', 105, y, { align: 'center' });
    
    pdf.save(`Relatorio_Vistoria_${getVal('protocolo') || 'sem_protocolo'}.pdf`);
    mostrarStatus('PDF gerado com sucesso!');
  } catch(e) {
    console.error(e);
    mostrarStatus('Erro ao gerar PDF: ' + e.message, 'error');
  }
};

// Inicialização
document.addEventListener('DOMContentLoaded', function() {
  const hoje = new Date();
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  if(document.getElementById('dia')) document.getElementById('dia').value = hoje.getDate();
  if(document.getElementById('mes')) document.getElementById('mes').value = meses[hoje.getMonth()];
  if(document.getElementById('ano')) document.getElementById('ano').value = hoje.getFullYear();
  
  // Checkbox handlers
  const chkInc = document.getElementById('inconformidades');
  const chkSem = document.getElementById('semInconformidades');
  const descIncDiv = document.getElementById('desc-inconformidades');
  const descSemDiv = document.getElementById('desc-sem-inconformidades');
  const containerInc = document.getElementById('container-inconformidades');
  const containerSem = document.getElementById('container-sem-inconformidades');
  
  if(chkInc) {
    chkInc.onchange = function() {
      if(this.checked) {
        chkSem.checked = false;
        descIncDiv.style.display = 'block';
        descSemDiv.style.display = 'none';
        containerInc.classList.add('checked');
        containerSem.classList.remove('checked');
      } else {
        descIncDiv.style.display = 'none';
        containerInc.classList.remove('checked');
      }
      atualizarTextoGerado();
    };
  }
  
  if(chkSem) {
    chkSem.onchange = function() {
      if(this.checked) {
        chkInc.checked = false;
        descSemDiv.style.display = 'block';
        descIncDiv.style.display = 'none';
        containerSem.classList.add('checked');
        containerInc.classList.remove('checked');
      } else {
        descSemDiv.style.display = 'none';
        containerSem.classList.remove('checked');
      }
      atualizarTextoGerado();
    };
  }
  
  if(descIncDiv) descIncDiv.style.display = 'none';
  if(descSemDiv) descSemDiv.style.display = 'none';
  
  const fotoInput = document.getElementById('fotoInput');
  if(fotoInput) {
    fotoInput.addEventListener('change', function(e) {
      processarArquivos(e.target.files);
      this.value = '';
    });
  }
  
  renderizarTecnicos();
  renderizarRepresentantes();
  renderizarConformidades();
  renderizarInconformidades();
  renderizarFotos();
  atualizarTextoGerado();
  
  setTimeout(() => window.carregarFormulario(), 300);
});
</script>
